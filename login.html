<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrionAI — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0e1420;
      --surface2: #151d2e;
      --border: rgba(99,179,255,0.12);
      --accent: #4f9cf9;
      --accent2: #7c5cfc;
      --text: #e8f0ff;
      --muted: #7a8aaa;
      --error: #ff6b6b;
      --success: #4cffb3;
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated background */
    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: #4f9cf9; top: -150px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 400px; height: 400px; background: #7c5cfc; bottom: -100px; right: -80px; animation-delay: -4s; }
    .orb3 { width: 300px; height: 300px; background: #00d4ff; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -8s; }

    @keyframes drift {
      0% { transform: translate(0,0) scale(1); }
      100% { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Stars */
    .stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 60%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 50%, rgba(255,255,255,0.2) 0%, transparent 100%);
    }

    /* Card */
    .card {
      position: relative; z-index: 1;
      background: rgba(14,20,32,0.85);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px rgba(79,156,249,0.06), 0 32px 80px rgba(0,0,0,0.5);
      animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px; justify-content: center;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 20px rgba(79,156,249,0.35);
    }
    .logo-text {
      font-size: 26px; font-weight: 700;
      background: linear-gradient(90deg, #e8f0ff, #4f9cf9);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    /* Tabs */
    .tabs {
      display: flex; background: var(--surface2);
      border-radius: 12px; padding: 4px; margin-bottom: 32px;
    }
    .tab-btn {
      flex: 1; padding: 10px; border: none; background: transparent;
      color: var(--muted); font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 500; border-radius: 9px;
      cursor: pointer; transition: all 0.25s;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    /* Forms */
    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 13px; color: var(--muted); font-weight: 500; }
    .field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,156,249,0.12);
    }
    .field input::placeholder { color: var(--muted); opacity: 0.6; }

    .submit-btn {
      margin-top: 4px;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: white; font-family: 'Sora', sans-serif;
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(79,156,249,0.3);
    }
    .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 28px rgba(79,156,249,0.45); }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 12px;
      color: var(--muted); font-size: 12px; margin: 4px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Google btn */
    .google-btn {
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Sora', sans-serif;
      font-size: 14px; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, border-color 0.2s;
    }
    .google-btn:hover { background: var(--surface2); border-color: rgba(99,179,255,0.25); }
    .google-btn svg { width: 18px; height: 18px; }

    /* Message */
    .msg {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .msg.error { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.25); color: var(--error); display: block; }
    .msg.success { background: rgba(76,255,179,0.1); border: 1px solid rgba(76,255,179,0.25); color: var(--success); display: block; }

    /* Loading spinner */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-text {
      text-align: center; margin-top: 24px;
      font-size: 12px; color: var(--muted);
    }
    .footer-text a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>
  <div class="stars"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">OrionAI</span>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Masuk</button>
      <button class="tab-btn" onclick="switchTab('register')">Daftar</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- Login Form -->
    <div id="form-login" class="form active">
      <div class="field">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="kamu@email.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="••••••••" />
      </div>
      <button class="submit-btn" onclick="doLogin()">Masuk</button>
      <div class="divider">atau</div>
      <button class="google-btn" onclick="doGoogle()">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Lanjut dengan Google
      </button>
    </div>

    <!-- Register Form -->
    <div id="form-register" class="form">
      <div class="field">
        <label>Nama Lengkap</label>
        <input type="text" id="reg-name" placeholder="Nama kamu" />
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="kamu@email.com" />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Min. 6 karakter" />
      </div>
      <button class="submit-btn" onclick="doRegister()">Buat Akun</button>
      <div class="divider">atau</div>
      <button class="google-btn" onclick="doGoogle()">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Lanjut dengan Google
      </button>
    </div>

    <p class="footer-text">Dengan mendaftar kamu menyetujui <a href="#">Syarat & Ketentuan</a></p>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBDFWnGF4gG7nRrqwGAlxL-EOZiSPXs7kM",
      authDomain: "chessorion-cb690.firebaseapp.com",
      projectId: "chessorion-cb690",
      storageBucket: "chessorion-cb690.firebasestorage.app",
      messagingSenderId: "936378240439",
      appId: "1:936378240439:web:2f3322128895151da52c32",
      measurementId: "G-7F01NEEJGY"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const analytics = getAnalytics(app);
    const provider = new GoogleAuthProvider();

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }
    function clearMsg() {
      const el = document.getElementById('msg');
      el.className = 'msg';
      el.textContent = '';
    }
    function setLoading(btn, loading) {
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span>';
      } else {
        btn.disabled = false;
      }
    }

    window.switchTab = function(tab) {
      clearMsg();
      document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
      document.getElementById('form-login').classList.toggle('active', tab==='login');
      document.getElementById('form-register').classList.toggle('active', tab==='register');
    };

    window.doLogin = async function() {
      clearMsg();
      const email = document.getElementById('login-email').value.trim();
      const pass = document.getElementById('login-pass').value;
      const btn = document.querySelector('#form-login .submit-btn');
      if (!email || !pass) return showMsg('Isi semua kolom ya!', 'error');
      setLoading(btn, true);
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        showMsg('Berhasil masuk! Mengalihkan...', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch(e) {
        const msgs = { 'auth/user-not-found':'Akun tidak ditemukan', 'auth/wrong-password':'Password salah', 'auth/invalid-email':'Email tidak valid', 'auth/too-many-requests':'Terlalu banyak percobaan, coba lagi nanti' };
        showMsg(msgs[e.code] || e.message, 'error');
        btn.textContent = 'Masuk';
      }
      setLoading(btn, false);
      if(!document.querySelector('#form-login .submit-btn').disabled) btn.textContent = 'Masuk';
    };

    window.doRegister = async function() {
      clearMsg();
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const pass = document.getElementById('reg-pass').value;
      const btn = document.querySelector('#form-register .submit-btn');
      if (!name||!email||!pass) return showMsg('Isi semua kolom ya!', 'error');
      if (pass.length < 6) return showMsg('Password minimal 6 karakter', 'error');
      setLoading(btn, true);
      try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(cred.user, { displayName: name });
        showMsg('Akun berhasil dibuat! Mengalihkan...', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch(e) {
        const msgs = { 'auth/email-already-in-use':'Email sudah dipakai', 'auth/invalid-email':'Email tidak valid', 'auth/weak-password':'Password terlalu lemah' };
        showMsg(msgs[e.code] || e.message, 'error');
        btn.textContent = 'Buat Akun';
      }
      setLoading(btn, false);
      if(!document.querySelector('#form-register .submit-btn').disabled) btn.textContent = 'Buat Akun';
    };

    window.doGoogle = async function() {
      clearMsg();
      try {
        await signInWithPopup(auth, provider);
        showMsg('Berhasil! Mengalihkan...', 'success');
        setTimeout(() => window.location.href = 'index.html', 1000);
      } catch(e) {
        if (e.code !== 'auth/popup-closed-by-user') showMsg('Gagal login Google: ' + e.message, 'error');
      }
    };
  </script>
</body>
</html>
