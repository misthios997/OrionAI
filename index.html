<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OrionAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070d1a;
      --sidebar: #0b1120;
      --surface: #0f1828;
      --surface2: #162035;
      --surface3: #1c2a42;
      --border: rgba(79,156,249,0.1);
      --border2: rgba(79,156,249,0.18);
      --accent: #4f9cf9;
      --accent2: #7c5cfc;
      --accent3: #00d4ff;
      --text: #e4eeff;
      --text2: #a8bad8;
      --muted: #5a7090;
      --user-bubble: rgba(79,156,249,0.12);
      --ai-bubble: rgba(15,24,40,0.95);
      --drawer-w: 320px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); display: flex; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    /* ── DRAWER (model selector) ── */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
      backdrop-filter: blur(4px);
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed; top: 0; left: 0; height: 100%;
      width: var(--drawer-w);
      background: var(--sidebar);
      border-right: 1px solid var(--border2);
      z-index: 101;
      transform: translateX(-100%);
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
      display: flex; flex-direction: column;
      box-shadow: 4px 0 40px rgba(0,0,0,0.5);
    }
    .drawer.open { transform: translateX(0); }

    .drawer-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .drawer-logo { display: flex; align-items: center; gap: 10px; flex: 1; }
    .drawer-logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 16px; box-shadow: 0 0 16px rgba(79,156,249,0.3);
    }
    .drawer-logo-text { font-size: 18px; font-weight: 700; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .drawer-close {
      width: 32px; height: 32px; border: none; background: transparent;
      color: var(--muted); cursor: pointer; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s; font-size: 18px;
    }
    .drawer-close:hover { background: var(--surface2); color: var(--text); }

    .drawer-section { padding: 16px 20px 8px; font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; }

    .model-list { flex: 1; overflow-y: auto; padding: 0 12px; }

    .model-card {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-radius: 12px; cursor: pointer;
      transition: background 0.2s; margin-bottom: 4px;
      border: 1px solid transparent;
    }
    .model-card:hover { background: var(--surface2); }
    .model-card.active { background: rgba(79,156,249,0.1); border-color: rgba(79,156,249,0.25); }

    .model-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .model-info { flex: 1; min-width: 0; }
    .model-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .model-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .model-badge {
      font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px;
      background: rgba(79,156,249,0.15); color: var(--accent); flex-shrink: 0;
    }

    /* ── SIDEBAR (history) ── */
    .sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      height: 100%;
    }
    @media (max-width: 900px) { .sidebar { display: none; } }

    .sidebar-header {
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; }
    .sidebar-logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px; display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .sidebar-logo-text { font-size: 17px; font-weight: 700; background: linear-gradient(90deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

    .new-chat-btn {
      padding: 6px 14px; background: var(--surface2);
      border: 1px solid var(--border2); border-radius: 8px;
      color: var(--text2); font-family: 'Sora', sans-serif;
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    }
    .new-chat-btn:hover { background: var(--surface3); color: var(--text); }

    .history-section { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; padding: 14px 16px 6px; }

    .history-list { flex: 1; overflow-y: auto; padding: 0 8px; }

    .history-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 10px; border-radius: 9px; cursor: pointer;
      transition: background 0.15s; group: true;
    }
    .history-item:hover { background: var(--surface2); }
    .history-item.active { background: rgba(79,156,249,0.1); }
    .history-item-text { flex: 1; font-size: 13px; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .history-item.active .history-item-text { color: var(--text); }
    .history-item-actions { display: none; gap: 4px; }
    .history-item:hover .history-item-actions { display: flex; }
    .hist-action-btn {
      width: 24px; height: 24px; border: none; background: transparent;
      color: var(--muted); cursor: pointer; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: background 0.15s, color 0.15s;
    }
    .hist-action-btn:hover { background: var(--surface3); color: var(--text); }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 600; color: white; flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-email { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .logout-btn {
      width: 30px; height: 30px; border: none; background: transparent;
      color: var(--muted); cursor: pointer; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 16px;
    }
    .logout-btn:hover { background: var(--surface2); color: var(--text); }

    /* ── MAIN AREA ── */
    .main {
      flex: 1; display: flex; flex-direction: column; height: 100%;
      min-width: 0; background: var(--bg);
    }

    /* Top bar */
    .topbar {
      height: 60px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px; padding: 0 20px;
      background: rgba(7,13,26,0.8); backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .menu-btn {
      width: 38px; height: 38px; border: none; background: transparent;
      color: var(--text2); cursor: pointer; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 18px; flex-shrink: 0;
    }
    .menu-btn:hover { background: var(--surface2); color: var(--text); }

    .topbar-model {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      padding: 6px 12px; border-radius: 10px; border: 1px solid var(--border);
      transition: all 0.2s; background: transparent;
      font-family: 'Sora', sans-serif;
    }
    .topbar-model:hover { background: var(--surface2); border-color: var(--border2); }
    .topbar-model-icon { font-size: 16px; }
    .topbar-model-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .topbar-model-arrow { color: var(--muted); font-size: 12px; }

    .topbar-spacer { flex: 1; }

    .topbar-right { display: flex; align-items: center; gap: 8px; }

    .icon-btn {
      width: 36px; height: 36px; border: none; background: transparent;
      color: var(--text2); cursor: pointer; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 16px; text-decoration: none;
    }
    .icon-btn:hover { background: var(--surface2); color: var(--text); }

    /* ── MESSAGES ── */
    .messages {
      flex: 1; overflow-y: auto; padding: 24px 0;
      display: flex; flex-direction: column; gap: 0;
    }

    .welcome {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 40px 24px; text-align: center; gap: 16px;
    }
    .welcome-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 20px; display: flex; align-items: center; justify-content: center;
      font-size: 32px; margin-bottom: 8px;
      box-shadow: 0 0 40px rgba(79,156,249,0.3);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { box-shadow: 0 0 40px rgba(79,156,249,0.3); } 50% { box-shadow: 0 0 60px rgba(79,156,249,0.5); } }

    .welcome h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .welcome p { color: var(--text2); font-size: 15px; max-width: 420px; line-height: 1.6; }

    .suggestions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 8px; max-width: 560px; }
    .suggestion-chip {
      padding: 10px 16px; border-radius: 20px;
      border: 1px solid var(--border2); background: var(--surface);
      color: var(--text2); font-size: 13px; cursor: pointer;
      transition: all 0.2s; font-family: 'Sora', sans-serif;
    }
    .suggestion-chip:hover { background: var(--surface2); border-color: var(--accent); color: var(--text); transform: translateY(-1px); }

    /* Message row */
    .msg-row {
      display: flex; padding: 6px 24px; gap: 12px;
      animation: msgIn 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .msg-row:hover .msg-actions { opacity: 1; }

    .msg-row.user { flex-direction: row-reverse; }
    .msg-row.user .msg-bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(79,156,249,0.2);
      border-radius: 18px 4px 18px 18px;
      max-width: 75%;
    }
    .msg-row.ai .msg-bubble {
      background: transparent;
      border-radius: 4px 18px 18px 18px;
      max-width: 80%;
    }

    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; margin-top: 4px;
    }
    .msg-row.user .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; font-weight: 600; }
    .msg-row.ai .msg-avatar { background: linear-gradient(135deg, #1a2a4a, #162035); border: 1px solid var(--border2); color: var(--accent); }

    .msg-content { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .msg-bubble { padding: 12px 16px; font-size: 14.5px; line-height: 1.65; color: var(--text); word-break: break-word; }
    .msg-bubble pre { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin: 8px 0; overflow-x: auto; }
    .msg-bubble code { font-family: 'Space Mono', monospace; font-size: 13px; background: var(--surface2); padding: 2px 6px; border-radius: 5px; }
    .msg-bubble pre code { background: transparent; padding: 0; }
    .msg-bubble strong { color: var(--accent3); }
    .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 6px 0; }
    .msg-bubble li { margin: 4px 0; }
    .msg-bubble p { margin: 6px 0; }
    .msg-bubble p:first-child { margin-top: 0; }
    .msg-bubble p:last-child { margin-bottom: 0; }
    .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
    .msg-bubble h1,.msg-bubble h2,.msg-bubble h3 { color: var(--text); margin: 10px 0 4px; }
    .msg-bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text2); margin: 8px 0; }

    /* Image in message */
    .msg-img { max-width: 280px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; display: block; }

    .msg-actions {
      display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s;
      margin-top: 2px; padding: 0 4px;
    }
    .msg-row.user .msg-actions { flex-direction: row-reverse; }

    .action-btn {
      width: 28px; height: 28px; border: none; background: transparent;
      color: var(--muted); cursor: pointer; border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; transition: all 0.15s;
    }
    .action-btn:hover { background: var(--surface2); color: var(--text); }

    /* Edit mode */
    .msg-edit-area {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 10px; padding: 10px 12px; color: var(--text);
      font-family: 'Sora', sans-serif; font-size: 14.5px; line-height: 1.65;
      resize: none; outline: none; margin-bottom: 6px;
    }
    .msg-edit-btns { display: flex; gap: 8px; }
    .edit-save-btn, .edit-cancel-btn {
      padding: 5px 14px; border-radius: 7px; font-family: 'Sora', sans-serif;
      font-size: 13px; font-weight: 500; cursor: pointer; border: none;
    }
    .edit-save-btn { background: var(--accent); color: white; }
    .edit-cancel-btn { background: var(--surface3); color: var(--text2); }

    /* Thinking/streaming */
    .thinking {
      display: flex; gap: 5px; padding: 14px 16px; align-items: center;
    }
    .thinking-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent); opacity: 0.6;
      animation: blink 1.2s infinite;
    }
    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,100%{opacity:0.3;transform:scale(0.9)} 50%{opacity:1;transform:scale(1.1)} }

    /* Image preview */
    .img-preview-wrap {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding: 10px 24px 0; border-top: 1px solid var(--border);
    }
    .img-preview-item { position: relative; }
    .img-preview-thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border2); }
    .img-preview-remove {
      position: absolute; top: -6px; right: -6px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--surface3); border: 1px solid var(--border2);
      color: var(--muted); cursor: pointer; font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }

    /* ── INPUT AREA ── */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 16px 24px 20px;
      background: rgba(7,13,26,0.95);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }
    .input-box {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 16px;
      display: flex; flex-direction: column; gap: 8px;
      padding: 12px 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within {
      border-color: rgba(79,156,249,0.4);
      box-shadow: 0 0 0 3px rgba(79,156,249,0.08);
    }
    .input-textarea {
      background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'Sora', sans-serif;
      font-size: 15px; resize: none; line-height: 1.5;
      max-height: 200px; overflow-y: auto;
    }
    .input-textarea::placeholder { color: var(--muted); }
    .input-bottom { display: flex; align-items: center; gap: 8px; }
    .input-left { display: flex; gap: 6px; }
    .input-spacer { flex: 1; }

    .attach-btn {
      width: 34px; height: 34px; border: none;
      background: transparent; color: var(--text2);
      cursor: pointer; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 16px;
    }
    .attach-btn:hover { background: var(--surface2); color: var(--text); }

    .send-btn {
      width: 36px; height: 36px; border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; cursor: pointer; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(79,156,249,0.3);
    }
    .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(79,156,249,0.5); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .input-hint { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }

    /* ── Notification toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--text); font-size: 13px; padding: 10px 18px;
      border-radius: 10px; opacity: 0; pointer-events: none;
      transition: all 0.3s; z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Inline edit rename ── */
    .rename-input {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 6px; padding: 3px 8px; color: var(--text);
      font-family: 'Sora', sans-serif; font-size: 13px; outline: none;
      width: 100%;
    }

    /* Mobile topbar new chat */
    .mobile-new-btn {
      display: none; align-items: center; gap: 5px;
    }
    @media (max-width: 900px) { .mobile-new-btn { display: flex; } }

    /* Orion bg animation */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(79,156,249,0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(124,92,252,0.05) 0%, transparent 50%);
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<!-- DRAWER OVERLAY -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- MODEL DRAWER -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-logo">
      <div class="drawer-logo-icon">✦</div>
      <span class="drawer-logo-text">OrionAI</span>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-section">Pilih Model</div>
  <div class="model-list" id="modelList"></div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">✦</div>
      <span class="sidebar-logo-text">OrionAI</span>
    </div>
    <button class="new-chat-btn" onclick="newChat()">
      <span>+</span> Baru
    </button>
  </div>
  <div class="history-section">Riwayat Chat</div>
  <div class="history-list" id="historyList"></div>
  <div class="sidebar-footer">
    <div class="user-avatar" id="userAvatar">U</div>
    <div class="user-info">
      <div class="user-name" id="userName">Loading...</div>
      <div class="user-email" id="userEmail">...</div>
    </div>
    <button class="logout-btn" onclick="doLogout()" title="Keluar">⎋</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <button class="menu-btn" onclick="openDrawer()" title="Pilih Model">☰</button>
    <button class="topbar-model" onclick="openDrawer()">
      <span class="topbar-model-icon" id="topModelIcon">✦</span>
      <span class="topbar-model-name" id="topModelName">Claude Sonnet</span>
      <span class="topbar-model-arrow">▾</span>
    </button>
    <div class="topbar-spacer"></div>
    <div class="topbar-right">
      <span id="apiStatus" style="font-size:11px;color:var(--muted);padding:0 8px;white-space:nowrap;overflow:hidden;max-width:140px;text-overflow:ellipsis"></span>
      <button class="icon-btn mobile-new-btn" onclick="newChat()" title="Chat Baru">✎</button>
      <button class="icon-btn" onclick="clearAllHistory()" title="Hapus Semua History">🗑</button>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <!-- Image preview strip -->

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

  return { id: genId(), title: 'Chat Baru', messages: [], created: Date.now() };
}

  const chat = newChatObj();
  chats[chat.id] = chat;
  activeChatId = chat.id;
  renderHistory();
  renderMessages();
  saveChats();
};

function setActiveChat(id) {
  activeChatId = id;
  renderHistory();
  renderMessages();
}

// ── STORAGE ──
async function saveChats() {
  if (!currentUser) { console.warn('saveChats: no user'); return; }
  const ref = doc(db, 'users', currentUser.uid, 'chats', 'data');
  await setDoc(ref, { chats: JSON.stringify(chats) });
}

async function loadChats() {
  if (!currentUser) return;
  const ref = doc(db, 'users', currentUser.uid, 'chats', 'data');
  const snap = await getDoc(ref);
  if (snap.exists()) {
    try { chats = JSON.parse(snap.data().chats) || {}; } catch(e) { chats = {}; }
  }
  const keys = Object.keys(chats);
  if (keys.length === 0) {
    const c = newChatObj();
    chats[c.id] = c;
    activeChatId = c.id;
  } else {
    activeChatId = keys.sort((a,b)=>((chats[b].created||0)-(chats[a].created||0)))[0];
  }
  renderHistory();
  renderMessages();
}

// ── HISTORY ──
function renderHistory() {
  const list = document.getElementById('historyList');
  const sorted = Object.values(chats).sort((a,b)=>(b.created||0)-(a.created||0));
  if (sorted.length === 0) { list.innerHTML = '<div style="padding:12px 10px;font-size:12px;color:var(--muted)">Belum ada chat</div>'; return; }
  list.innerHTML = sorted.map(c => `
    <div class="history-item ${c.id===activeChatId?'active':''}" onclick="setActiveChat('${c.id}')">
      <span class="history-item-text" id="hist-title-${c.id}">${escHtml(c.title)}</span>
      <div class="history-item-actions">
        <button class="hist-action-btn" onclick="startRename(event,'${c.id}')" title="Rename">✎</button>
        <button class="hist-action-btn" onclick="deleteChat(event,'${c.id}')" title="Hapus" style="color:#ff6b6b">🗑</button>
      </div>
    </div>
  `).join('');
}

window.deleteChat = function(e, id) {

  if (activeChatId === id) {
    const keys = Object.keys(chats);
    if (keys.length === 0) { const c=newChatObj(); chats[c.id]=c; activeChatId=c.id; }
    else activeChatId = keys[0];

};

window.startRename = function(e, id) {
  e.stopPropagation();

  const inp = titleEl.querySelector('input');
  inp.focus(); inp.select();
};
window.finishRename = function(id, val) {
  if (chats[id] && val.trim()) { chats[id].title = val.trim(); saveChats(); }

};

// ── MESSAGES RENDER ──
function renderMessages() {
  const chat = chats[activeChatId];
  const container = document.getElementById('messages');
  if (!chat || chat.messages.length === 0) {
    container.innerHTML = `
      <div class="welcome">
        <div class="welcome-icon">✦</div>
        <h1>Halo! Saya OrionAI</h1>
        <p>Saya siap membantu kamu berpikir, menulis, menganalisis, dan menjelajahi ide baru.</p>
        <div class="suggestions">
          <div class="suggestion-chip" onclick="insertSuggestion('Jelaskan konsep machine learning dengan sederhana')">Jelaskan ML dengan sederhana</div>
          <div class="suggestion-chip" onclick="insertSuggestion('Bantu saya menulis email profesional')">Tulis email profesional</div>
          <div class="suggestion-chip" onclick="insertSuggestion('Buatkan kode Python untuk membaca file CSV')">Kode Python CSV</div>
          <div class="suggestion-chip" onclick="insertSuggestion('Apa tren teknologi AI terkini?')">Tren AI terkini</div>
        </div>
      </div>`;
    return;
  }
  container.innerHTML = chat.messages.map(msg => renderMsgRow(msg)).join('');
  container.scrollTop = container.scrollHeight;
}

function renderMsgRow(msg) {
  const isUser = msg.role === 'user';
  const avatarContent = isUser ? (currentUser?.displayName?.[0]||'U') : '✦';
  let imgHtml = '';
  if (msg.imgs && msg.imgs.length > 0) {
    imgHtml = msg.imgs.map(img => `<img class="msg-img" src="${img}" alt="gambar"/>`).join('');
  }
  const bubbleContent = isUser ? `<div class="msg-bubble">${imgHtml}${escHtml(msg.content).replace(/\n/g,'<br>')}</div>` :
    `<div class="msg-bubble">${imgHtml}${markdownToHtml(msg.content)}</div>`;

  return `<div class="msg-row ${isUser?'user':'ai'}" data-id="${msg.id}">
    <div class="msg-avatar">${avatarContent}</div>
    <div class="msg-content">
      ${bubbleContent}
      <div class="msg-actions">
        <button class="action-btn" onclick="copyMsg('${msg.id}')" title="Salin">⧉</button>
        ${isUser?`<button class="action-btn" onclick="editMsg('${msg.id}')" title="Edit">✎</button>`:''}
        <button class="action-btn" onclick="deleteMsg('${msg.id}')" title="Hapus" style="color:#ff6b6b">✕</button>
      </div>
    </div>
  </div>`;
}

window.copyMsg = function(id) {
  const chat = chats[activeChatId];
  const msg = chat?.messages.find(m=>m.id===id);
  if (msg) { navigator.clipboard.writeText(msg.content); showToast('Disalin!'); }
};

window.deleteMsg = function(id) {
  const chat = chats[activeChatId];
  if (!chat) return;
  chat.messages = chat.messages.filter(m=>m.id!==id);

};

window.editMsg = function(id) {
  const chat = chats[activeChatId];
  const msg = chat?.messages.find(m=>m.id===id);
  if (!msg) return;
  const row = document.querySelector(`.msg-row[data-id="${id}"]`);
  if (!row) return;
  const content = row.querySelector('.msg-content');
  content.innerHTML = `
    <textarea class="msg-edit-area" id="edit-${id}" rows="3">${escHtml(msg.content)}</textarea>
    <div class="msg-edit-btns">
      <button class="edit-save-btn" onclick="saveEdit('${id}')">Simpan</button>
      <button class="edit-cancel-btn" onclick="renderMessages()">Batal</button>
    </div>`;
  const ta = document.getElementById('edit-'+id);
  ta.style.height = ta.scrollHeight + 'px';
  ta.focus();
};

window.saveEdit = function(id) {
  const chat = chats[activeChatId];
  const msg = chat?.messages.find(m=>m.id===id);

window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
};

window.handleFiles = function(e) {
  const files = Array.from(e.target.files);
  files.forEach(f => {
    const reader = new FileReader();
    reader.onload = ev => {
      pendingImages.push({ base64: ev.target.result, type: f.type, name: f.name });
      renderImgPreviews();
    };
    reader.readAsDataURL(f);
  });
  e.target.value = '';
};

function renderImgPreviews() {
  const wrap = document.getElementById('imgPreviewWrap');
  if (pendingImages.length === 0) { wrap.style.display='none'; wrap.innerHTML=''; return; }
  wrap.style.display = 'flex';
  wrap.innerHTML = pendingImages.map((img,i) => `
    <div class="img-preview-item">
      <img class="img-preview-thumb" src="${img.base64}" alt="${img.name}"/>
      <button class="img-preview-remove" onclick="removePreviewImg(${i})">✕</button>
    </div>
  `).join('');
}

window.removePreviewImg = function(i) {
  pendingImages.splice(i,1);
  renderImgPreviews();
};

window.sendMessage = async function() {
  if (isStreaming) return;
  const ta = document.getElementById('inputText');
  const text = ta.value.trim();
  if (!text && pendingImages.length === 0) return;

  const chat = chats[activeChatId];
  if (!chat) return;

  const imgs = pendingImages.map(p => p.base64);
  const imgData = pendingImages.map(p => ({ base64: p.base64.split(',')[1], type: p.type, base64full: p.base64 }));
  pendingImages = [];
  renderImgPreviews();

  // Add user message
  const userMsg = { id: genId(), role: 'user', content: text, imgs };
  if (chat.messages.length === 0 && text) chat.title = text.slice(0,40) + (text.length>40?'...':'');
  chat.messages.push(userMsg);
  ta.value = ''; ta.style.height = 'auto';
  renderHistory(); renderMessages();
  await saveChats();

  // Build API messages (OpenRouter / OpenAI format)
  const apiMessages = chat.messages.slice(0,-1).map(m => {
    if (m.imgs && m.imgs.length > 0 && m.role === 'user') {
      const content = [];
      m.imgs.forEach(imgSrc => {
        content.push({ type:'image_url', image_url:{ url: imgSrc } });
      });
      if (m.content) content.push({ type:'text', text: m.content });
      return { role:'user', content };
    }
    return { role: m.role, content: m.content };
  });

  // Last user message
  const lastContent = [];
  if (imgData.length > 0) {
    imgData.forEach(img => lastContent.push({ type:'image_url', image_url:{ url: img.base64full } }));
  }
  if (text) lastContent.push({ type:'text', text });
  apiMessages.push({ role:'user', content: lastContent.length===1&&lastContent[0].type==='text' ? text : lastContent });

  // Thinking indicator
  const aiMsgId = genId();
  const aiMsg = { id: aiMsgId, role: 'assistant', content: '' };
  chat.messages.push(aiMsg);

  const container = document.getElementById('messages');
  container.insertAdjacentHTML('beforeend', `
    <div class="msg-row ai" data-id="${aiMsgId}">
      <div class="msg-avatar">✦</div>
      <div class="msg-content">
        <div class="msg-bubble" id="stream-${aiMsgId}">
          <div class="thinking"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>
        </div>
      </div>
    </div>`);
  container.scrollTop = container.scrollHeight;

  document.getElementById('sendBtn').disabled = true;
  isStreaming = true;

  try {
    console.log('OrionAI: Sending to model:', currentModel.id);
    const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + OPENROUTER_KEY,
        'HTTP-Referer': window.location.href,
        'X-Title': 'OrionAI'
      },
      body: JSON.stringify({
        model: currentModel.id,
        max_tokens: 2048,
        messages: [
          { role: 'system', content: 'Kamu adalah OrionAI, asisten AI yang cerdas, membantu, dan ramah. Jawab dalam bahasa yang sama dengan pengguna. Gunakan format markdown jika membantu.' },
          ...apiMessages
        ]
      })
    });

    if (!response.ok) {
      let errText = '';
      try { const errData = await response.json(); errText = errData?.error?.message || errData?.message || JSON.stringify(errData); }
      catch(je) { errText = await response.text().catch(() => ''); }
      throw new Error(`[${response.status}] ${errText || response.statusText}`);
    }

    const data = await response.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    const fullText = data.choices?.[0]?.message?.content || '';
    if (!fullText) throw new Error('Respons kosong dari model. Coba model lain.');
    aiMsg.content = fullText;

    const streamEl = document.getElementById('stream-'+aiMsgId);
    if (streamEl) streamEl.innerHTML = markdownToHtml(fullText);
    container.scrollTop = container.scrollHeight;
    await saveChats();

  } catch(err) {
    // Remove the empty AI message if there's an error
    chat.messages = chat.messages.filter(m => m.id !== aiMsgId);
    const streamEl = document.getElementById('stream-'+aiMsgId);
    if (streamEl) {
      const row = streamEl.closest('.msg-row');
      if (row) row.innerHTML = `
        <div class="msg-avatar" style="background:rgba(255,107,107,0.15);color:#ff6b6b">!</div>
        <div class="msg-content">
          <div class="msg-bubble" style="color:#ff6b6b;background:rgba(255,107,107,0.08);border:1px solid rgba(255,107,107,0.2);border-radius:4px 18px 18px 18px;padding:12px 16px">
            ⚠️ <strong>Gagal:</strong> ${escHtml(err.message)}
          </div>
        </div>`;
    }
    console.error('OrionAI API error:', err);
    await saveChats();
  }

  document.getElementById('sendBtn').disabled = false;
  isStreaming = false;
};

// ── TOAST ──
window.showToast = function(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 2500);
};

// ── LOGOUT ──
window.doLogout = async function() {
  await signOut(auth);
  window.location.href = 'login.html';
};

// ── MARKDOWN SIMPLE ──
function markdownToHtml(text) {
  if (!text) return '';
  let h = text;
  // Code blocks
  h = h.replace(/```(\w*)\n?([\s\S]*?)```/g, (_,lang,code) => `<pre><code>${escHtml(code.trim())}</code></pre>`);
  // Inline code
  h = h.replace(/`([^`]+)`/g, (_,c) => `<code>${escHtml(c)}</code>`);
  // Bold
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/__([^_]+)__/g, '<strong>$1</strong>');
  // Italic
  h = h.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  h = h.replace(/_([^_]+)_/g, '<em>$1</em>');
  // Headers
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Blockquote
  h = h.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  // HR
  h = h.replace(/^---$/gm, '<hr>');
  // Unordered list
  h = h.replace(/^[*\-] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // Ordered list
  h = h.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Links
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
  // Paragraphs
  h = h.split(/\n{2,}/).map(para => {
    if (para.match(/^<(h[1-3]|ul|ol|pre|blockquote|hr)/)) return para;
    return `<p>${para.replace(/\n/g,'<br>')}</p>`;
  }).join('');
  return h;
}

function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── AUTH ──
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  document.getElementById('userName').textContent = user.displayName || 'Pengguna';
  document.getElementById('userEmail').textContent = user.email || '';
  document.getElementById('userAvatar').textContent = (user.displayName||user.email||'U')[0].toUpperCase();
  renderModels();
  await loadChats();
  // Test API key validity
  testApiKey();
});

async function testApiKey() {
  const statusEl = document.getElementById('apiStatus');
  try {
    const res = await fetch('https://openrouter.ai/api/v1/auth/key', {
      headers: { 'Authorization': 'Bearer ' + OPENROUTER_KEY }
    });
    const data = await res.json();
    if (data.error) {
      const msg = data.error.message || JSON.stringify(data.error);
      if (statusEl) { statusEl.textContent = '🔴 Key Error: ' + msg; statusEl.style.color = '#ff6b6b'; }
      showToast('⚠️ API Key Error: ' + msg, 5000);
    } else {
      const limit = data.data?.limit != null ? `$${(data.data.limit/100).toFixed(2)}` : '?';
      const usage = data.data?.usage != null ? `$${(data.data.usage/100).toFixed(4)}` : '?';
      const isUnlimited = data.data?.is_free_tier;
      const info = isUnlimited ? 'Free tier ✓' : `Sisa: ${limit} | Terpakai: ${usage}`;
      if (statusEl) { statusEl.textContent = '🟢 ' + info; statusEl.style.color = '#4cffb3'; }
    }
  } catch(e) {
    if (statusEl) { statusEl.textContent = '🟡 Tidak bisa cek API'; statusEl.style.color = '#ffd700'; }
  }
}
